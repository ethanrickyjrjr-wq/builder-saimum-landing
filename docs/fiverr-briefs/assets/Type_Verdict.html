<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Verdict</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
</head>
<body class="preview">
<div class="card-frame">

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;">
  
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start;">
      <span class="verdict" data-direction="bullish" style="font-size:40px;">bullish</span>
      <span style="font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);">data-direction="bullish"</span>
    </div>
  
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start;">
      <span class="verdict" data-direction="bearish" style="font-size:40px;">bearish</span>
      <span style="font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);">data-direction="bearish"</span>
    </div>
  
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start;">
      <span class="verdict" data-direction="mixed" style="font-size:40px;">mixed</span>
      <span style="font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);">data-direction="mixed"</span>
    </div>
  
    <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-start;">
      <span class="verdict" data-direction="neutral" style="font-size:40px;">neutral</span>
      <span style="font-size:10px;color:var(--text-tertiary);font-family:var(--font-mono);">data-direction="neutral"</span>
    </div>
  
</div>
<div style="font-size:12px;color:var(--text-tertiary);">Inter 600 · -2% tracking · lowercase, no punctuation · the only typographic element treated like a brand wordmark.</div>
</div></body></html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Metric label + value</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
</head>
<body class="preview">
<div class="card-frame">

<div style="display:flex;gap:48px;align-items:flex-end;">
  <div>
    <div class="metric-label">Median DOM, Lee single-family</div>
    <div style="display:flex;align-items:baseline;gap:6px;margin-top:6px;">
      <span class="metric-value">51</span>
      <span class="metric-unit">days</span>
    </div>
    <div style="font-size:12px;color:var(--mangrove);margin-top:4px;font-variant-numeric:tabular-nums;">▲ +6 vs prior month</div>
  </div>
  <div>
    <div class="metric-label">Building permits MTD, Lee</div>
    <div style="display:flex;align-items:baseline;gap:6px;margin-top:6px;">
      <span class="metric-value">1,247</span>
      <span class="metric-unit">permits</span>
    </div>
    <div style="font-size:12px;color:var(--sunset-coral);margin-top:4px;font-variant-numeric:tabular-nums;">▼ -12% YoY</div>
  </div>
</div>
</div></body></html>

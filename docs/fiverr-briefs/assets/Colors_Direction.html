<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Direction</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
</head>
<body class="preview">
<div class="card-frame">

<div class="row">
  
    <div class="swatch" style="flex:1;min-width:140px;">
      <div class="chip" style="background:#5BC97A"></div>
      <div class="verdict" style="color:#5BC97A;font-size:22px;line-height:1;">bullish</div>
      <div class="hex">#5BC97A</div>
    </div>
    <div class="swatch" style="flex:1;min-width:140px;">
      <div class="chip" style="background:#E08158"></div>
      <div class="verdict" style="color:#E08158;font-size:22px;line-height:1;">bearish</div>
      <div class="hex">#E08158</div>
    </div>
    <div class="swatch" style="flex:1;min-width:140px;">
      <div class="chip" style="background:#D4B370"></div>
      <div class="verdict" style="color:#D4B370;font-size:22px;line-height:1;">mixed</div>
      <div class="hex">#D4B370</div>
    </div>
    <div class="swatch" style="flex:1;min-width:140px;">
      <div class="chip" style="background:#B8B4A8"></div>
      <div class="verdict" style="color:#B8B4A8;font-size:22px;line-height:1;">neutral</div>
      <div class="hex">#B8B4A8</div>
    </div>
</div>
<div style="font-size:12px;color:var(--text-tertiary);">Direction is the only place state is encoded in color. Set instantly — never animate the transition.</div>
</div></body></html>
